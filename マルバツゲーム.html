<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>QR通信チャット</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode"></script>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#111;
color:white;
}

#chat{
height:200px;
overflow:auto;
border:1px solid #555;
margin:10px;
padding:10px;
}

input,button{
padding:10px;
font-size:16px;
margin:5px;
}
</style>
</head>

<body>

<h2>📡 QR通信チャット</h2>

<button onclick="createRoom()">ルーム作成</button>

<div id="qrcode"></div>

<div id="reader" style="width:300px;margin:auto;"></div>
<button onclick="scan()">QR読み取り</button>

<div id="chat"></div>

<input id="msg" placeholder="メッセージ">
<button onclick="send()">送信</button>

<script>

let conn;
let peer = new Peer();
let roomId;

peer.on("connection",c=>{
conn=c;
conn.on("data",d=>{
add("相手: "+d);
});
});

function createRoom(){

roomId=Math.random().toString(36).substr(2,8);

QRcode.toCanvas(document.getElementById("qrcode"),roomId);

}

function scan(){

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
{ facingMode:"environment"},
{ fps:10, qrbox:250 },
qr=>{
roomId=qr;
connect();
html5QrCode.stop();
});

}

function connect(){

conn=peer.connect(roomId);

conn.on("open",()=>{
add("接続しました");
});

conn.on("data",d=>{
add("相手: "+d);
});

}

function send(){

let m=document.getElementById("msg").value;

conn.send(m);

add("自分: "+m);

}

function add(t){

let c=document.getElementById("chat");

c.innerHTML+=t+"<br>";
c.scrollTop=9999;

}

</script>

</body>
</html>
